# =========================================
# APPLICATION
# =========================================
spring.application.name=ssweb

# =========================================
# DATABASE
# =========================================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/ss_test_db}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Root@5566}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =========================================
# SERVER
# =========================================
server.port=${PORT:8080}

# =========================================
# EMAIL
# =========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}