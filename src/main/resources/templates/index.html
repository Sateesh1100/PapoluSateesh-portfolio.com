<!-- Contact Section -->
<section id="contact" class="section">
    <div class="container">
        <h2 class="text-center">Contact Me</h2>
        <hr>

        <div class="row justify-content-center">
            <div class="col-md-6">

                <!-- WORKING FORM -->
                <form action="/contact" method="POST">

                    <!-- Name -->
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input 
                            type="text" 
                            name="name"
                            class="form-control" 
                            placeholder="Enter your name"
                            required>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input 
                            type="email" 
                            name="email"
                            class="form-control" 
                            placeholder="Enter your email"
                            required>
                    </div>

                    <!-- Message -->
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea 
                            name="message"
                            class="form-control" 
                            rows="4"
                            placeholder="Enter your message"
                            required>
                        </textarea>
                    </div>

                    <!-- Button -->
                    <button 
                        type="submit" 
                        class="btn btn-primary w-100">
                        Send Message
                    </button>

                </form>

            </div>
        </div>
    </div>
</section>
