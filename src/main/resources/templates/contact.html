<!DOCTYPE html>
<html>
<head>
    <title>Contact Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: blue;
            color: white;
            padding: 10px;
            width: 100%;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Contact Form</h2>

    <form action="/contact" method="POST">

        <input type="text"
               name="name"
               placeholder="Enter Name"
               required>

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <textarea name="message"
                  placeholder="Enter Message"
                  required>
        </textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</div>

</body>
</html>
